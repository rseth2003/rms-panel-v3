<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="RMS">
<meta name="copyright" content="© 2026 RMS">
<title>RMS Panel — Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>RMS Panel</h1>
      <p class="sub">UDP Custom Manager Web Panel</p>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="login()">Log In</button>
      <p class="error-text hidden" id="loginError"></p>
      <p class="copyright-note" style="text-align:center; margin-top:20px;">© 2026 RMS</p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // If already logged in, skip straight to dashboard
    if (getToken()) window.location.href = 'home.html';

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('loginError');
      errEl.classList.add('hidden');

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        setSession(data.token, data.user);
        window.location.href = 'home.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
