<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="RMS">
<meta name="copyright" content="© 2026 RMS">
<title>Create Reseller — RMS Panel</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-content">
      <div class="topbar" id="topbar"></div>
      <div class="page-body" style="max-width:480px;">
        <div class="card">
          <div class="section-header">
            <h2>Create Reseller</h2>
            <a class="btn btn-ghost btn-sm" href="resellers.html">← Back</a>
          </div>

          <div class="form-group">
            <label>Username</label>
            <input type="text" id="username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="text" id="password">
          </div>
          <div class="form-group">
            <label>Starting Credits</label>
            <input type="number" id="credits" value="0" min="0">
          </div>

          <div class="form-actions">
            <a class="btn btn-ghost" href="resellers.html">Cancel</a>
            <button class="btn btn-primary" onclick="submitCreate()">Create Reseller</button>
          </div>
          <p class="error-text hidden" id="formError"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    const user = requireAuth();
    if (!['super_admin','admin'].includes(user.role)) window.location.href = 'vpn-users.html';
    renderSidebar('resellers');
    renderTopbar('Create Reseller');

    async function submitCreate() {
      const errEl = document.getElementById('formError');
      errEl.classList.add('hidden');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const credits = parseInt(document.getElementById('credits').value, 10) || 0;

      if (!username || !password) {
        errEl.textContent = 'Username and password are required.';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        await apiFetch('/resellers', {
          method: 'POST',
          body: JSON.stringify({ username, password, credits })
        });
        window.location.href = 'resellers.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
